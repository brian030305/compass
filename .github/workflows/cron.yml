name: Bizinfo Oracle Auto Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
    - name: 1️⃣ 깃허브 서버로 코드 다운로드
      uses: actions/checkout@v3
      with:
        ref: main

    - name: 2️⃣ 파이썬 환경 세팅 (버전 3.10)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3️⃣ 필수 라이브러리 자동 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas sqlalchemy oracledb

    - name: 4️⃣ 업데이트 스크립트 실행 (보안키 주입)
      env:
        ORACLE_USER: ${{ secrets.ORACLE_USER }}
        ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
        WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
        WALLET_BASE64: ${{ secrets.WALLET_BASE64 }}
        BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
      run: python update_bizinfo.py
